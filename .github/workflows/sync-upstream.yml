name: Sync upstream

on:
  schedule:
    # Mondays 16:00 UTC = Mondays 03:00 AEDT (Tue 02:00 AEDT in DST)
    - cron: '0 16 * * 1'
  workflow_dispatch:
    inputs:
      merge_main:
        description: "Fast-forward main after verification"
        type: boolean
        default: false
      keep_worktree:
        description: "Keep the integration worktree on the runner (debug only)"
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name  "nanobot-sync-bot"
          git config user.email "nanobot-sync-bot@users.noreply.github.com"

      - name: Add upstream remote (push disabled)
        run: |
          git remote add upstream https://github.com/HKUDS/nanobot.git
          git remote set-url --push upstream DISABLED

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libolm-dev build-essential

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python deps (primary venv for sync script)
        run: |
          uv venv --python 3.12 "$HOME/.nanobot/venv312"
          VIRTUAL_ENV="$HOME/.nanobot/venv312" uv pip install -e ".[dev]"

      - name: Run sync script
        id: sync
        run: |
          set +e
          FLAGS=""
          if [[ "${{ github.event.inputs.merge_main }}" == "true" ]]; then FLAGS="$FLAGS --merge-main"; fi
          if [[ "${{ github.event.inputs.keep_worktree }}" == "true" ]]; then FLAGS="$FLAGS --keep-worktree"; fi
          bash scripts/sync_upstream_to_fork.sh $FLAGS 2>&1 | tee sync.log
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
          BRANCH=$(grep -oE 'codex/upstream-sync-[0-9-]+' sync.log | head -1)
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"

      - name: Summarise merge log
        if: always()
        run: |
          echo '## Sync summary' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -80 sync.log >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Open PR for integration branch
        if: steps.sync.outputs.exit_code == '0' && steps.sync.outputs.branch != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.sync.outputs.branch }}
        run: |
          set -e
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            PR_URL=$(gh pr list --head "$BRANCH" --state open --json url --jq '.[0].url')
            if [[ -z "$PR_URL" ]]; then
              gh pr create \
                --base main \
                --head "$BRANCH" \
                --title "sync: upstream → imehr ($(date -u +%Y-%m-%d))" \
                --body "$(cat <<'BODY'
Automated upstream sync run. All 22-file verification tests passed on the runner.

**What to review**
- Any non-trivial conflict resolutions in custom fork areas (knowledge, capture, MLX-VLM, agent-browser, macOS app).
- New upstream config keys or removed config structs.
- New upstream dependencies added to `pyproject.toml`.

**Safe merge actions**
- Squash merge, or plain merge commit if upstream history matters.
- Run the full test suite locally before merging if any CI job is red.

Generated by `.github/workflows/sync-upstream.yml`.
BODY
)"
            fi
          fi

      - name: Open issue on failure
        if: steps.sync.outputs.exit_code != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="Weekly upstream sync failed ($(date -u +%Y-%m-%d))"
          BODY_FILE=$(mktemp)
          {
            echo "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo ""
            echo "Exit code: ${{ steps.sync.outputs.exit_code }}"
            echo ""
            echo "### Last 80 lines of sync.log"
            echo '```'
            tail -80 sync.log
            echo '```'
          } > "$BODY_FILE"

          EXISTING=$(gh issue list --label sync-failure --state open --json number --jq '.[0].number' || true)
          if [[ -n "$EXISTING" ]]; then
            gh issue comment "$EXISTING" --body-file "$BODY_FILE"
          else
            gh issue create --title "$TITLE" --label sync-failure --body-file "$BODY_FILE"
          fi

      - name: Upload sync log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sync-log
          path: sync.log
          retention-days: 30
