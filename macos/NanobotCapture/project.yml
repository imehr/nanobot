name: NanobotCapture
options:
  bundleIdPrefix: ai.nanobot
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: 6.0
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
targets:
  NanobotCapture:
    type: application
    platform: macOS
    sources:
      - path: NanobotCapture
        excludes:
          - Info.plist
          - Resources
      - path: NanobotCaptureShareExtension/ExtensionPayloadExtractor.swift
    info:
      path: NanobotCapture/Info.plist
    dependencies:
      - target: NanobotCaptureShareExtension
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.nanobot.capture
        PRODUCT_NAME: NanobotCapture
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        ENABLE_DEBUG_DYLIB: NO
        ENABLE_APP_SANDBOX: YES
        CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION: YES
        CODE_SIGN_ENTITLEMENTS: NanobotCapture/NanobotCapture.entitlements
    scheme:
      testTargets:
        - NanobotCaptureTests
  NanobotCaptureTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: NanobotCaptureTests
        excludes:
          - Info.plist
    info:
      path: NanobotCaptureTests/Info.plist
    dependencies:
      - target: NanobotCapture
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.nanobot.capture.tests
        PRODUCT_NAME: NanobotCaptureTests
  NanobotCaptureShareExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: NanobotCapture/Client
      - path: NanobotCaptureShareExtension
        excludes:
          - Info.plist
    info:
      path: NanobotCaptureShareExtension/Info.plist
      properties:
        NSExtension:
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsImageWithMaxCount: 10
              NSExtensionActivationSupportsFileWithMaxCount: 10
              NSExtensionActivationSupportsWebURLWithMaxCount: 10
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: NanobotCaptureShareExtension.ShareViewController
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.nanobot.capture.share
        PRODUCT_NAME: NanobotCaptureShareExtension
        ENABLE_APP_SANDBOX: YES
        CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION: YES
        CODE_SIGN_ENTITLEMENTS: NanobotCaptureShareExtension/NanobotCaptureShareExtension.entitlements
